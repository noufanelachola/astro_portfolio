[config.site]
title = "Noufan Elachola"
description = "Personal website of Noufan Elachola, a Computer Science Engineering student documenting projects, blogs, and research in OT/ICS Cybersecurity, Industrial Automation, Malware Analysis, AI, and Critical Infrastructure Security."
pageTitle = "Noufan Elachola | OT & ICS Cybersecurity"
pageDescription = "Welcome to my personal website where I share projects, technical blogs, research notes, and my journey into Operational Technology (OT) and Industrial Control Systems (ICS) Cybersecurity."
repository = "https://github.com/noufanelachola"
footerNote = "Built with Astro. Designed and maintained by Noufan Elachola"

[config.vibe]
showTrail = true

[config.theme]
# Available palettes:
# green-soft, green-vivid, rose-soft, pink-soft, purple-soft, blue-soft, orange-soft, brown-soft
palette = "blue-soft"

[config.code]
lightTheme = "catppuccin-latte"
darkTheme = "catppuccin-macchiato"
lineNumbers = true
wrap = true
preserveIndent = true
collapseStyle = "collapsible-auto"

[config.math]
render = "katex" # "katex" | "mathjax"

[config.comments]
enabled = false
provider = "none"
show_on_posts = true

[config.search]
enabled = true
shortcut = "mod+k"
placeholder = "Search articles, projects, and notes..."
maxResults = 6

[config.blog]
postsPerPage = 6

[config.comments.giscus]
repo = ""
repo_id = ""
category = ""
category_id = ""
mapping = "pathname"
strict = "0"
reactions_enabled = "1"
emit_metadata = "0"
input_position = "top"
light_theme = "light"
dark_theme = "dark"
lang = "zh-CN"
loading = "lazy"

[config.comments.utterances]
repo = ""
issue_term = "pathname"
label = "comment"
theme = "github-light"

[config.comments.waline]
server_url = ""
lang = "zh-CN"
dark = "html.dark"
pageview = true
comment = true

[config.profile]
name = "Noufan Elachola"
handle = "@noufanelachola"
role = "Engineer"
company = "OT & ICS Security Engineer"
location = "Kerala, India"
email = "noufansadiqelachola@gmail.com"
website = "https://noufanelachola.com"
github = "https://github.com/noufanelachola"
meta = "Documenting my journey in OT, ICS, Industrial Automation, Malware Analysis, and AI"
avatar = "/images/pht (1).jpg"

